<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #e5e5e5;
  font-size: 13px;
}
.header {
  padding: 14px 16px;
  background: #111;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 { font-size: 15px; font-weight: 600; color: #ff6b00; }
.dot {
  width: 8px; height: 8px; border-radius: 50%; background: #444;
  flex-shrink: 0;
}
.dot.ok { background: #22c55e; }
.dot.running { background: #ff6b00; animation: pulse 1.5s infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }
.model-tag {
  margin-left: auto;
  font-size: 11px;
  color: #666;
  background: #1a1a1a;
  padding: 2px 8px;
  border-radius: 4px;
}

.controls {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
select, input, button {
  font-family: inherit; font-size: 13px;
  border: 1px solid #2a2a2a; border-radius: 8px;
  background: #141414; color: #e5e5e5;
  padding: 10px 12px; outline: none;
  transition: border-color 0.15s;
}
select:focus, input:focus { border-color: #ff6b00; }
input::placeholder { color: #555; }

.btn-row { display: flex; gap: 8px; }
button { cursor: pointer; font-weight: 500; }
button.primary {
  background: #ff6b00; color: #fff; border-color: #ff6b00; flex: 1;
}
button.primary:hover { background: #e06000; }
button.primary:disabled { background: #222; border-color: #222; color: #555; cursor: default; }
button.stop { background: #dc2626; border-color: #dc2626; color: #fff; width: 70px; }
button.stop:hover { background: #b91c1c; }

.log {
  max-height: 300px; overflow-y: auto;
  padding: 8px 16px;
  display: flex; flex-direction: column; gap: 3px;
}
.log::-webkit-scrollbar { width: 4px; }
.log::-webkit-scrollbar-track { background: transparent; }
.log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.entry {
  padding: 5px 8px; border-radius: 4px;
  font-size: 12px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  line-height: 1.5; word-break: break-word;
}
.entry.thinking { color: #a78bfa; background: rgba(167, 139, 250, 0.06); }
.entry.step { color: #22c55e; }
.entry.error { color: #ef4444; }
.entry.done { color: #ff6b00; font-weight: 600; }
.entry.info { color: #666; }

.footer {
  padding: 8px 16px; font-size: 11px; color: #444;
  border-top: 1px solid #1a1a1a;
  display: flex; justify-content: space-between;
}
</style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Ollama Browser Agent</h1>
    <span class="model-tag" id="modelTag">-</span>
  </div>

  <div class="controls">
    <select id="model"><option value="">Checking Ollama...</option></select>
    <input type="text" id="task" placeholder="What should I do on this page?" autofocus />
    <div class="btn-row">
      <button class="primary" id="run" disabled>Run</button>
      <button class="stop" id="stop" style="display:none">Stop</button>
    </div>
  </div>

  <div class="log" id="log"></div>
  <div class="footer">
    <span id="status">Connecting...</span>
    <span id="steps"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
